name: Release

# Build arthur32 for Linux, macOS and Windows whenever a vN.N tag is pushed,
# then publish a GitHub Release with the three binaries attached.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # allow manual build runs (no release on these)

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            bin_path: build/arthur32
            asset: arthur32-linux-x86_64
          - os: macos-latest
            name: macos-arm64
            bin_path: build/arthur32
            asset: arthur32-macos-arm64
          - os: windows-latest
            name: windows-x86_64
            bin_path: build/Release/arthur32.exe
            asset: arthur32-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.bin_path }}" "dist/${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
